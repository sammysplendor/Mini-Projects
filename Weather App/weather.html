<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="weather.css" />
    <title>Mini WEATHER APP</title>
    <script src="weather.js" defer></script>
  </head>
  <body>
    <main class="main-container">
      <h2>WEATHER APP</h2>
      <p>Which city would you like to check the weather?</p>
      <form action="" method="get">
        <div class="input-container">
          <input
            type="text"
            id="city-name"
            name="city"
            placeholder="Enter city name"
            required
          />
        </div>
        <div class="btn-container">
          <button id="get-weather-btn" type="submit">Get Weather</button>
          <button id="clear-btn" type="reset">Clear</button>
        </div>
      </form>
      <div class="weather-display"></div>
    </main>
  </body>
</html>
